<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; }
  body {
    background: radial-gradient(ellipse at 50% 30%, #15171f 0%, #0a0b0e 60%);
    color:#e8e4d8;
    font-family:"Cormorant Garamond", serif;
    position:relative;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  /* circuit grid */
  .grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(57,216,196,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,216,196,0.05) 1px, transparent 1px);
    background-size:48px 48px;
    -webkit-mask-image: radial-gradient(ellipse at 50% 45%, #000 25%, transparent 75%);
  }
  /* deco frame */
  .frame { position:absolute; inset:34px; border:1px solid rgba(200,163,90,0.45); border-radius:8px; }
  .corner { position:absolute; width:34px; height:34px; border:2px solid #c8a35a; }
  .c1 { top:48px; left:48px; border-right:none; border-bottom:none; }
  .c2 { top:48px; right:48px; border-left:none; border-bottom:none; }
  .c3 { bottom:48px; left:48px; border-right:none; border-top:none; }
  .c4 { bottom:48px; right:48px; border-left:none; border-top:none; }

  .content { position:relative; z-index:2; text-align:center; }
  .eyebrow {
    font-family:"JetBrains Mono", monospace; font-size:20px; letter-spacing:0.4em;
    text-transform:uppercase; color:#39d8c4; opacity:0.9; margin-bottom:30px;
  }
  .glass { font-size:54px; margin-bottom:14px; }
  h1 {
    font-family:"Cinzel", serif; font-weight:700; font-size:104px; letter-spacing:0.03em;
    color:#e0c587; line-height:1; text-shadow:0 0 50px rgba(200,163,90,0.35);
  }
  .sub {
    font-family:"Cinzel", serif; font-size:34px; letter-spacing:0.34em; text-transform:uppercase;
    color:#c8a35a; margin-top:22px;
  }
  .deco { display:flex; align-items:center; justify-content:center; gap:16px; margin:34px 0 26px; color:#c8a35a; opacity:0.75; }
  .deco::before, .deco::after { content:""; height:1px; width:140px; }
  .deco::before { background:linear-gradient(90deg, transparent, #c8a35a); }
  .deco::after  { background:linear-gradient(90deg, #c8a35a, transparent); }
  .deco span { font-size:18px; }
  .tag { font-style:italic; font-size:38px; color:#e8e4d8; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="frame"></div>
  <div class="corner c1"></div><div class="corner c2"></div>
  <div class="corner c3"></div><div class="corner c4"></div>

  <div class="content">
    <div class="eyebrow">Members Only · By Invitation</div>
    <div class="glass">🥃</div>
    <h1>Token Talkers</h1>
    <div class="sub">— The Hidden Layer —</div>
    <div class="deco"><span>◆</span></div>
    <div class="tag">Those who speak the language of machines.</div>
  </div>
</body>
</html>
